<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSIS-2B Login Dashboard</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      margin:0;
      padding:0;
    }

    .container{
      width:350px;
      background:white;
      margin:50px auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
      text-align:center;
    }

    h2{
      margin-bottom:20px;
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      width:95%;
      padding:10px;
      margin-top:10px;
      border:none;
      background:blue;
      color:white;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:darkblue;
    }

    a{
      color:blue;
      cursor:pointer;
    }

    img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:10px;
      border:3px solid blue;
    }

    .hidden{
      display:none;
    }

    p{
      text-align:left;
      margin-left:15px;
    }
  </style>
</head>

<body>

<!-- REGISTER FORM -->
<div class="container" id="registerPage">

  <h2>Register</h2>

  <input type="text" id="name" placeholder="Full Name">

  <input type="text" id="age" placeholder="Age">

  <input type="text" id="course" placeholder="Course & Section">

  <input type="email" id="email" placeholder="Email">

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <input type="file" id="photo" accept="image/*">

  <button onclick="register()">Register</button>

  <h4>
    Already have an account?
    <a onclick="showLogin()">Login</a>
  </h4>

</div>

<!-- LOGIN FORM -->
<div class="container hidden" id="loginPage">

  <h2>Login</h2>

  <input type="text" id="loginUser" placeholder="Username">

  <input type="password" id="loginPass" placeholder="Password">

  <button onclick="login()">Login</button>

  <h4>
    No account?
    <a onclick="showRegister()">Register</a>
  </h4>

</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardPage">

  <h2>Dashboard</h2>

  <img id="displayPhoto" src="">

  <p><b>Full Name:</b> <span id="dName"></span></p>

  <p><b>Age:</b> <span id="dAge"></span></p>

  <p><b>Course:</b> <span id="dCourse"></span></p>

  <p><b>Email:</b> <span id="dEmail"></span></p>

  <p><b>Username:</b> <span id="dUser"></span></p>

  <button onclick="logout()">Logout</button>

</div>

<script>

  function showLogin(){
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  }

  function showRegister(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
  }

  function register(){

    let file = document.getElementById("photo").files[0];

    let reader = new FileReader();

    reader.onload = function(){

      let user = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        course: document.getElementById("course").value,
        email: document.getElementById("email").value,
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        photo: reader.result
      };

      localStorage.setItem("user", JSON.stringify(user));

      alert("Registration Successful!");

      showLogin();
    };

    if(file){
      reader.readAsDataURL(file);
    } else {
      alert("Please upload a photo.");
    }
  }

  function login(){

    let username = document.getElementById("loginUser").value;
    let password = document.getElementById("loginPass").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if(user &&
       username === user.username &&
       password === user.password){

      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dashboardPage").classList.remove("hidden");

      document.getElementById("dName").innerHTML = user.name;
      document.getElementById("dAge").innerHTML = user.age;
      document.getElementById("dCourse").innerHTML = user.course;
      document.getElementById("dEmail").innerHTML = user.email;
      document.getElementById("dUser").innerHTML = user.username;

      document.getElementById("displayPhoto").src = user.photo;

    } else {
      alert("Invalid Username or Password!");
    }
  }

  function logout(){

    document.getElementById("dashboardPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");

  }

</script>

</body>
</html>
